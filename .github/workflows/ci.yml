name: CI

# Минималистичный CI для соло-разработчика:
#   • ловит сломанные backend-тесты (pytest);
#   • ловит TypeScript-ошибки и сломанную production-сборку frontend'а.
# Тяжёлый integration через docker compose делается локально:
#   docker compose --profile dev up -d && pytest -m integration

on:
  push:
    branches: [main, master, latest]
  pull_request:
    branches: [main, master, latest]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          # Кэшируем pip — сэкономит ~3 минуты на runs после первого билда,
          # т.к. sentence-transformers тянет PyTorch (~600 MB).
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scientific KB tests
        working-directory: backend
        # -m "not integration" исключает тесты, требующие живые Neo4j+PG.
        # Quality gate'ы (density, provenance, claim coverage) проверяются.
        run: pytest tests/ -v -m "not integration"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install --no-audit --no-fund

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build production bundle
        working-directory: frontend
        run: npm run build
