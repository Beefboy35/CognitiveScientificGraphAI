name: CI

on:
  push:
    branches: [latest, main, master]
  pull_request:
    branches: [latest, main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scientific KB tests
        working-directory: backend
        run: |
          python -m pytest tests/test_demo_coverage.py -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install --no-audit --no-fund

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Scan repository (excluding lockfiles and migrations)
        run: |
          detect-secrets scan \
            --exclude-files 'package-lock\.json|yarn\.lock|node_modules/|\.venv/|data/' \
            > .secrets.scan.json
          python -c "import json; data = json.load(open('.secrets.scan.json')); results = data.get('results', {}); assert not results, f'Potential secrets detected: {list(results.keys())}'"

  integration:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          cp .env.example .env
          echo "POSTGRES_PASSWORD=ci_temporary_password_only" >> .env
          echo "NEO4J_PASSWORD=ci_temporary_password_only" >> .env

      - name: Start docker services
        run: |
          docker compose --profile dev up -d
          sleep 30
          docker compose ps

      - name: Run pytest inside fastapi-dev container
        run: |
          docker compose exec -T fastapi-dev python -m pytest tests/test_demo_coverage.py -v
